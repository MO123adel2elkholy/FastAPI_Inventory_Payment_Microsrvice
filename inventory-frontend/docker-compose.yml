version: '3.8'
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: inventory-frontend:latest
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # Development profile: run with `docker compose --profile dev up --build`
  frontend-dev:
    profiles: ["dev"]
    image: node:18
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install --silent && npm start"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - BROWSER=none

  # builder: builds the React production static files into a named volume
  frontend-builder:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./:/app:cached
      - frontend_build:/app/build
      - /app/node_modules
    environment:
      - NODE_ENV=production
    command: sh -c "npm ci --silent && npm run build"
    profiles: ["build"]

  # nginx service: serves files from the named volume
  nginx:
    image: nginx:stable-alpine
    ports:
      - "3000:80"
    volumes:
      - frontend_build:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend-builder
    restart: unless-stopped

volumes:
  frontend_build: